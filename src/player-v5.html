<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK_PLAYER // V5_OMARCHY_TUI</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=ibm-plex-mono@400,600&f[]=clash-display@700&display=swap">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --bg: #050505; --fg: #EAEAEA; --border: #222222; --accent: #FF2A2A; --font-mono: 'IBM Plex Mono', monospace; --font-display: 'Clash Display', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--fg); font-family: var(--font-mono); height: 100vh; display: grid; grid-template-columns: 240px 1fr 340px; grid-template-rows: 1fr 140px; border: 1px solid var(--border); overflow: hidden; }
        .panel { border: 0.5px solid var(--border); padding: 24px; display: flex; flex-direction: column; }
        .panel-nav { grid-row: 1 / 3; gap: 40px; }
        .logo { font-family: var(--font-display); font-size: 18px; color: var(--accent); }
        .panel-explorer { grid-column: 2; padding: 0; }
        .explorer-header { padding: 32px; border-bottom: 1px solid var(--border); }
        .explorer-header h1 { font-family: var(--font-display); font-size: 42px; text-transform: uppercase; }
        .track-row { display: grid; grid-template-columns: 40px 1fr 150px 80px; padding: 14px 32px; font-size: 13px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .track-row.active { color: var(--accent); background: rgba(255,42,42,0.05); }
        .panel-info { grid-column: 3; background: #080808; gap: 32px; }
        .art-box { width: 100%; aspect-ratio: 1; border: 1px solid var(--border); overflow: hidden; }
        .art-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }
        .panel-player { grid-column: 2 / 4; grid-row: 2; border-top: 2px solid var(--fg); padding: 32px; flex-direction: row; align-items: center; gap: 48px; }
        .ascii-bar { font-size: 14px; letter-spacing: -1px; color: var(--border); white-space: nowrap; overflow: hidden; }
        .ascii-fill { color: var(--fg); }
    </style>
</head>
<body>
    <section class="panel panel-nav"><div class="logo">PK_SYSTEM_v5.0</div><div style="margin-top:40px; opacity:0.4; font-size:10px;">MAIN_MENU</div><div style="font-size:13px; margin-top:10px; color:var(--accent);">01_EXPLORER</div><div style="font-size:13px; margin-top:10px;">02_COLLECTION</div></section>
    <section class="panel panel-explorer"><div class="explorer-header"><span style="font-size:10px; opacity:0.4;">DIRECTORY // MUSIC</span><h1>Digital_Midnight</h1></div><div class="track-row active"><span>01</span><span><b>Nightcall</b> / Kavinsky</span><span>Outrun</span><span style="text-align:right;">4:18</span></div><div class="track-row"><span>02</span><span><b>Starboy</b> / The Weeknd</span><span>Starboy</span><span style="text-align:right;">3:50</span></div></section>
    <section class="panel panel-info"><div class="art-box"><img src="https://picsum.photos/seed/kav/800/800"></div><div style="font-size:10px; opacity:0.4;">TELEMETRY_DATA</div><div style="font-size:11px; display:flex; justify-content:space-between;"><span>FORMAT</span><span>FLAC_LOSSLESS</span></div></section>
    <section class="panel panel-player"><i class="ph-fill ph-play-circle" style="font-size:48px;"></i><div style="flex:1;"><div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px;"><span>01:42 / 04:18</span><span>NIGHTCALL.FLAC</span></div><div class="ascii-bar"><span class="ascii-fill">████████████████████████</span>▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒</div></div></section>
</body>
</html>

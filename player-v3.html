<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK_PLAYER // V3_MINIMAL_FLOATING</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&f[]=clash-display@600,700&display=swap">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #FDFBF7;
            --surface: #FFFFFF;
            --border: rgba(0, 0, 0, 0.06);
            --text-main: #111111;
            --text-muted: #787774;
            --radius: 50px;
            --bezier: cubic-bezier(0.32, 0.72, 0, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Satoshi', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 40px 80px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Clash Display'; font-size: 24px; font-weight: 700; }
        .top-nav { display: flex; gap: 40px; }
        .top-nav a { text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 15px; }
        main { flex: 1; padding: 0 80px; overflow-y: auto; display: flex; flex-direction: column; gap: 80px; }
        .hero-section h1 { font-size: 100px; font-family: 'Clash Display'; line-height: 0.9; letter-spacing: -0.04em; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 40px; padding-bottom: 160px; }
        .card { cursor: pointer; display: flex; flex-direction: column; gap: 16px; transition: transform 0.4s var(--bezier); }
        .card:hover { transform: translateY(-10px); }
        .card-img { width: 100%; aspect-ratio: 1; border-radius: 24px; background: #EEE; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .player-bar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: calc(100% - 160px); max-width: 1000px; height: 90px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(32px); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; padding: 0 32px; gap: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .player-info { display: flex; align-items: center; gap: 12px; min-width: 200px; }
        .player-art { width: 48px; height: 48px; border-radius: 12px; overflow: hidden; }
        .player-art img { width: 100%; height: 100%; object-fit: cover; }
        .player-controls { flex: 1; display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .btns { display: flex; gap: 24px; align-items: center; }
        .play-btn { width: 42px; height: 42px; background: var(--text-main); color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .progress-container { width: 100%; max-width: 400px; height: 3px; background: rgba(0,0,0,0.05); }
        .progress-val { width: 30%; height: 100%; background: var(--text-main); }
    </style>
</head>
<body>
    <header>
        <div class="logo">PK_AUDIO</div>
        <nav class="top-nav"><a href="#">Playlists</a><a href="#">Artistes</a><a href="#">Albums</a></nav>
    </header>
    <main>
        <section class="hero-section"><h1>Modern Classics</h1></section>
        <section class="content-grid">
            <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/p1/400/400"></div><b>After Hours</b><span>The Weeknd</span></div>
            <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/p2/400/400"></div><b>Discovery</b><span>Daft Punk</span></div>
        </section>
    </main>
    <div class="player-bar">
        <div class="player-info"><div class="player-art"><img src="https://picsum.photos/seed/p1/100/100"></div><div class="player-text"><b>After Hours</b><span>The Weeknd</span></div></div>
        <div class="player-controls">
            <div class="btns"><i class="ph-bold ph-skip-back"></i><div class="play-btn"><i class="ph-fill ph-play"></i></div><i class="ph-bold ph-skip-forward"></i></div>
            <div class="progress-container"><div class="progress-val"></div></div>
        </div>
    </div>
</body>
</html>

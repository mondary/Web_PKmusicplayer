<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK_PLAYER // V2_EDITORIAL_3_COL</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&f[]=clash-display@600,700&display=swap">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #FDFBF7;
            --surface: #FFFFFF;
            --border: rgba(0, 0, 0, 0.06);
            --text-main: #111111;
            --text-muted: #787774;
            --accent: #E61919;
            --radius-outer: 24px;
            --radius-inner: 16px;
            --bezier: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Satoshi', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- COLUMN 1: SIDEBAR --- */
        .sidebar {
            width: 260px;
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .logo { font-family: 'Clash Display'; font-size: 20px; font-weight: 700; }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 16px; display: block; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-inner);
            cursor: pointer;
            transition: all 0.3s var(--bezier);
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active { background: rgba(0, 0, 0, 0.03); color: var(--text-main); transform: translateX(4px); }

        /* --- COLUMN 2: TRACKLIST --- */
        .main-content {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        .main-header h1 { font-size: 48px; font-family: 'Clash Display'; letter-spacing: -0.02em; }

        .track-grid { display: flex; flex-direction: column; gap: 4px; }
        .track-row {
            display: grid;
            grid-template-columns: 48px 1fr 120px 60px;
            align-items: center;
            padding: 12px 16px;
            border-radius: var(--radius-inner);
            cursor: pointer;
            transition: all 0.4s var(--bezier);
        }

        .track-row:hover { background: var(--surface); box-shadow: 0 4px 20px rgba(0,0,0,0.02); transform: translateY(-2px); }

        .track-art-small { width: 32px; height: 32px; border-radius: 6px; background: #EEE; overflow: hidden; }
        .track-art-small img { width: 100%; height: 100%; object-fit: cover; }

        .track-info-main b { display: block; font-size: 15px; }
        .track-info-main span { font-size: 13px; color: var(--text-muted); }

        /* --- COLUMN 3: PLAYER FOCUS --- */
        .player-panel {
            width: 400px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface);
        }

        .album-art-focus {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-outer);
            background: #f0f0f0;
            margin-bottom: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
        }
        .album-art-focus img { width: 100%; height: 100%; object-fit: cover; }

        .current-meta { text-align: center; margin-bottom: 40px; }
        .current-meta h2 { font-size: 28px; font-family: 'Clash Display'; margin-bottom: 8px; }
        .current-meta p { color: var(--text-muted); font-size: 16px; }

        .controls { width: 100%; display: flex; flex-direction: column; gap: 32px; }
        .progress-bar { height: 4px; background: var(--border); border-radius: 2px; position: relative; }
        .progress-fill { height: 100%; background: var(--text-main); width: 35%; border-radius: 2px; }

        .btns { display: flex; justify-content: center; align-items: center; gap: 32px; }
        .btn-icon { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-main); }
        .btn-play { width: 64px; height: 64px; background: var(--text-main); color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        .fade-in { animation: fadeIn 0.8s var(--bezier) forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">PK_PKM</div>
        <div class="nav-group">
            <span class="section-title">Playlists</span>
            <div class="nav-item active"><i class="ph-bold ph-music-notes"></i> Essentials 2024</div>
            <div class="nav-item"><i class="ph-bold ph-lightning"></i> High Energy</div>
            <div class="nav-item"><i class="ph-bold ph-moon"></i> Midnight Phonk</div>
        </div>
    </nav>
    <main class="main-content">
        <header class="main-header fade-in">
            <span class="section-title">Playlist / Essentials 2024</span>
            <h1>Vibe Selection</h1>
        </header>
        <section class="track-grid fade-in" style="animation-delay: 0.1s;">
            <div class="track-row" onclick="updateFocus('After Hours', 'The Weeknd', 'https://picsum.photos/seed/music1/600/600')">
                <div class="track-art-small"><img src="https://picsum.photos/seed/music1/100/100"></div>
                <div class="track-info-main"><b>After Hours</b><span>The Weeknd</span></div>
                <div style="color: var(--text-muted); font-size: 13px;">After Hours</div>
                <div style="color: var(--text-muted); font-size: 13px; text-align: right;">6:02</div>
            </div>
            <div class="track-row" onclick="updateFocus('Starboy', 'The Weeknd', 'https://picsum.photos/seed/music2/600/600')">
                <div class="track-art-small"><img src="https://picsum.photos/seed/music2/100/100"></div>
                <div class="track-info-main"><b>Starboy</b><span>The Weeknd</span></div>
                <div style="color: var(--text-muted); font-size: 13px;">Starboy</div>
                <div style="color: var(--text-muted); font-size: 13px; text-align: right;">3:50</div>
            </div>
        </section>
    </main>
    <aside class="player-panel">
        <div class="album-art-focus fade-in" style="animation-delay: 0.2s;">
            <img id="focusArt" src="https://picsum.photos/seed/music1/600/600" alt="Cover">
        </div>
        <div class="current-meta fade-in" style="animation-delay: 0.3s;">
            <h2 id="focusTitle">After Hours</h2>
            <p id="focusArtist">The Weeknd</p>
        </div>
        <div class="controls fade-in" style="animation-delay: 0.4s;">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div class="btns">
                <button class="btn-icon"><i class="ph-bold ph-skip-back"></i></button>
                <button class="btn-icon btn-play"><i class="ph-fill ph-play"></i></button>
                <button class="btn-icon"><i class="ph-bold ph-skip-forward"></i></button>
            </div>
        </div>
    </aside>
    <script>
        function updateFocus(title, artist, art) {
            document.getElementById('focusTitle').innerText = title;
            document.getElementById('focusArtist').innerText = artist;
            document.getElementById('focusArt').src = art;
        }
    </script>
</body>
</html>
